<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: white; display: inline-block; }
.code-block {
  background: #1e1e1e;
  color: #d4d4d4;
  border-radius: 8px;
  padding: 14px 18px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.7;
  display: inline-block;
  min-width: 300px;
}
.prompt { color: #888; }
.kw { color: #569cd6; }
.fn { color: #dcdcaa; }
.str { color: #ce9178; }
.num { color: #b5cea8; }
.out { color: #9cdcfe; }
.plain { color: #d4d4d4; }
</style>
</head>
<body>
<div class="code-block">
<div><span class="prompt">&gt;&gt;&gt; </span><span class="kw">for</span> <span class="plain">letter</span> <span class="kw">in</span> <span class="str">"hello"</span><span class="plain">:</span></div>
<div><span class="prompt">...&nbsp;&nbsp;&nbsp;&nbsp; </span><span class="fn">print</span>(<span class="plain">letter</span>)</div>
<div><span class="out">h</span></div>
<div><span class="out">e</span></div>
<div><span class="out">l</span></div>
<div><span class="out">l</span></div>
<div><span class="out">o</span></div>
</div>
</body>
</html>
