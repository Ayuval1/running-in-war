<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;800&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #0a0f1a;
  font-family: "Rubik", sans-serif;
  direction: rtl;
}

.canvas {
  position: relative;
  width: 1080px;
  height: 1080px;
  background: #0a0f1a;
  overflow: hidden;
}

/* Grid texture layer */
.grid-texture {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 1;
}

/* Vignette */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.45) 100%);
  z-index: 2;
}

/* Content container */
.content {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100%;
  padding: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Slide indicator — top-left in RTL = top-right visually */
.slide-indicator {
  position: absolute;
  top: 64px;
  left: 64px;
  font-family: "Space Mono", monospace;
  font-size: 14px;
  color: #00ff88;
  letter-spacing: 0.05em;
  z-index: 20;
}

/* Logo zone */
.logo-zone {
  margin-top: 36px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo-img {
  width: 380px;
  height: auto;
  filter: drop-shadow(0 0 28px rgba(0, 255, 136, 0.3));
}

/* Divider */
.divider {
  margin-top: 40px;
  width: 60%;
  height: 2px;
  background: #00ff88;
  border: none;
  flex-shrink: 0;
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
}

/* Headline */
.headline {
  margin-top: 48px;
  width: 100%;
  text-align: right;
}

.headline-line {
  display: block;
  font-family: "Rubik", sans-serif;
  font-weight: 800;
  font-size: 72px;
  color: #e8eef7;
  line-height: 1.15;
}

/* Tagline */
.tagline {
  margin-top: 24px;
  width: 100%;
  text-align: right;
  font-family: "Rubik", sans-serif;
  font-weight: 400;
  font-size: 22px;
  color: #8ba3c7;
  line-height: 1.4;
}

/* Corner accent L-shape — bottom-right in RTL (= bottom-left in LTR spec) */
.corner-accent {
  position: absolute;
  bottom: 64px;
  right: 64px;
  width: 60px;
  height: 60px;
  z-index: 20;
}

.corner-accent::before {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 60px;
  height: 2px;
  background: #00ff88;
  box-shadow: 0 0 6px rgba(0, 255, 136, 0.6);
}

.corner-accent::after {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 2px;
  height: 60px;
  background: #00ff88;
  box-shadow: 0 0 6px rgba(0, 255, 136, 0.6);
}

/* Pulse dot at corner */
.pulse-dot {
  position: absolute;
  bottom: 60px;
  right: 60px;
  width: 8px;
  height: 8px;
  background: #00ff88;
  border-radius: 50%;
  z-index: 21;
  box-shadow: 0 0 14px rgba(0, 255, 136, 0.9), 0 0 28px rgba(0, 255, 136, 0.4);
}
</style>
</head>
