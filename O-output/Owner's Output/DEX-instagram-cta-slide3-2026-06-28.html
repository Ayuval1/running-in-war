<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>RunningInWar — Instagram Slide 3/3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #04070e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ─── CANVAS 1080×1080 ─── */
    .canvas {
      width: 1080px;
      height: 1080px;
      background-color: #0a0f1a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Tactical grid: white dots, 28px grid, 3% opacity */
    .grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 1;
    }

    /* Edge vignette: dark at all four corners */
    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 55% at   0%   0%, rgba(0,0,0,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 100%   0%, rgba(0,0,0,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at   0% 100%, rgba(0,0,0,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 100% 100%, rgba(0,0,0,0.30) 0%, transparent 55%);
      z-index: 2;
    }

    /* ─── CORNER ACCENTS ─── */
    /* Top-left: subtle 30×30, 40% opacity */
    .corner-tl {
      position: absolute;
      top: 64px;
      left: 64px;
      width: 30px;
      height: 30px;
      border-top: 2px solid rgba(0, 255, 136, 0.40);
      border-left: 2px solid rgba(0, 255, 136, 0.40);
      z-index: 10;
    }

    /* Bottom-left: main L-accent, 60×60, full green */
    .corner-bl {
      position: absolute;
      bottom: 64px;
      left: 64px;
      width: 60px;
      height: 60px;
      border-bottom: 2px solid #00ff88;
      border-left: 2px solid #00ff88;
      box-shadow:
        -2px 2px 12px rgba(0,255,136,0.25),
         0   2px 12px rgba(0,255,136,0.25);
      z-index: 10;
    }

    /* ─── SLIDE COUNTER top-right ─── */
    .slide-counter {
      position: absolute;
      top: 64px;
      right: 64px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #00ff88;
      letter-spacing: 0.12em;
      z-index: 10;
    }

    /* ─── CONTENT AREA ─── */
    .content {
      position: absolute;
      top: 64px;
      right: 64px;
      bottom: 64px;
      left: 64px;
      display: flex;
      flex-direction: column;
      z-index: 5;
    }

    /* ─── HEADLINE ZONE ─── */
    .headline-zone {
      margin-top: 36px;   /* top of headline at ~100px from canvas edge */
      text-align: right;
    }

    .line1 {
      font-family: 'Rubik', sans-serif;
      font-weight: 800;
      font-size: 68px;
      line-height: 1.1;
      color: #e8eef7;
      letter-spacing: -0.01em;
    }

    .line2 {
      font-family: 'Rubik', sans-serif;
      font-weight: 800;
      font-size: 68px;
      line-height: 1.1;
      color: #00ff88;
      letter-spacing: -0.01em;
      text-shadow:
        0 0 20px rgba(0, 255, 136, 0.60),
        0 0 45px rgba(0, 255, 136, 0.28);
    }

    /* ─── SPACER: pushes divider to ~50% canvas height ─── */
    .spacer {
      flex: 1;
      max-height: 246px;
    }

    /* ─── DIVIDER: 55% width, right-aligned ─── */
    .divider {
      width: 55%;
      height: 2px;
      background-color: #00ff88;
      /* In RTL column flex, flex-start = visual right */
      align-self: flex-start;
      margin-top: 40px;
      margin-bottom: 40px;
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.45);
    }

    /* ─── HERO CTA BUTTON ─── */
    .cta-button {
      width: 680px;
      height: 100px;
      background: #00ff88;
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      cursor: pointer;
      box-shadow:
        0   0  40px rgba(0, 255, 136, 0.50),
        0   0  80px rgba(0, 255, 136, 0.25),
        0   0 120px rgba(0, 255, 136, 0.10);
    }

    .cta-button span {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #0a0f1a;
      letter-spacing: 0.01em;
      direction: rtl;
    }

    /* ─── SUB-COPY ─── */
    .sub-copy {
      font-family: 'Rubik', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #8ba3c7;
      text-align: right;
      margin-top: 28px;
      direction: rtl;
    }

    /* ─── TRUST BADGES ─── */
    .trust-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: row;
      direction: ltr;
      gap: 0;
      margin-top: 28px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      direction: ltr;
    }

    .badge svg {
      display: block;
      flex-shrink: 0;
    }

    .badge-text {
      font-family: 'Rubik', sans-serif;
      font-weight: 500;
      font-size: 13px;
      color: #8ba3c7;
      direction: rtl;
      white-space: nowrap;
    }

    .badge-sep {
      color: #00ff88;
      font-size: 18px;
      line-height: 1;
      margin: 0 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- Textures -->
    <div class="grid"></div>
    <div class="vignette"></div>

    <!-- Corner accents -->
    <div class="corner-tl"></div>
    <div class="corner-bl"></div>

    <!-- Slide counter: 3/3 -->
    <div class="slide-counter">3/3</div>

    <!-- ─── MAIN CONTENT ─── -->
    <div class="content">

      <!-- Headline zone -->
      <div class="headline-zone">
        <div class="line1">שים נעליים.</div>
        <div class="line2">הורד עכשיו.</div>
      </div>

      <!-- Spacer → divider lands near 50% canvas height -->
      <div class="spacer"></div>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Hero CTA button -->
      <div class="cta-button">
        <span>הורד את האפליקציה</span>
      </div>

      <!-- Sub-copy -->
      <p class="sub-copy">הקישור בביו — חינם, עברית, עובד.</p>

      <!-- Trust badges -->
      <div class="trust-badges">

        <!-- Shield: safe routes -->
        <div class="badge">
          <svg width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 1.5L1.5 3.8v3.7C1.5 11 4 13.3 7 14c3-0.7 5.5-3 5.5-6.5V3.8L7 1.5z" stroke="#8ba3c7" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
          </svg>
          <span class="badge-text">מסלולים בטוחים</span>
        </div>

        <span class="badge-sep">·</span>

        <!-- Pin: nearby shelters -->
        <div class="badge">
          <svg width="12" height="16" viewBox="0 0 12 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 1a5 5 0 0 1 5 5c0 3.5-5 9-5 9S1 9.5 1 6a5 5 0 0 1 5-5z" stroke="#8ba3c7" stroke-width="1.2" fill="none"/>
            <circle cx="6" cy="6" r="1.8" stroke="#8ba3c7" stroke-width="1.2"/>
          </svg>
          <span class="badge-text">מקלטים קרובים</span>
        </div>

        <span class="badge-sep">·</span>

        <!-- Check: totally free -->
        <div class="badge">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7.5" cy="7.5" r="6" stroke="#8ba3c7" stroke-width="1.2"/>
            <path d="M4.5 7.5l2 2.2 4-4" stroke="#8ba3c7" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="badge-text">חינם לחלוטין</span>
        </div>

      </div>

    </div>
  </div>
</body>
</html>
